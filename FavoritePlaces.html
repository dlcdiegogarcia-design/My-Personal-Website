<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Favorite Places</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #e0f7fa, #b2ebf2); }
    header { text-align: center; margin-bottom: 18px; }
    h1 { margin: 0; font-size: 24px; }
    .places { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .place { text-align: center; max-width: 300px; }
    .place img { width: 250px; height: auto; border-radius: 8px; }
    .place h4 { margin: 10px 0; }
    .place a { color: #0366d6; text-decoration: none; }
    .place a:hover { text-decoration: underline; }
    .button-container { text-align: center; margin-top: 20px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; background: #0366d6; color: #fff; text-decoration: none; border-radius: 6px; }
    .btn:hover { background: #0356b6; }
    .icon { font-size: 18px; }
  </style>
</head>
<body>
  <header>
    <h1>Favorite Places</h1>
  </header>

  <main class="places">
    <div class="place">
      <h4>Nuevo León, Mexico</h4>
      <a href="https://en.wikipedia.org/wiki/Nuevo_Le%C3%B3n" target="_blank">More about Nuevo León</a><br>
      <img src="/Images/NuevoLeon.jpg" alt="Nuevo León" width="250">
    </div>

    <div class="place">
      <h4>Florida, USA</h4>
      <a href="https://en.wikipedia.org/wiki/Florida" target="_blank">More about Florida</a><br>
      <img src="/Images/Florida.jpg" alt="Florida" width="250">
    </div>

    <div class="place">
      <h4>Barcelona, Spain</h4>
      <a href="https://en.wikipedia.org/wiki/Barcelona" target="_blank">More about Barcelona</a><br>
      <img src="/Images/Barcelona.jpg" alt="Barcelona" width="250">
    </div>
  </main>

  <div class="button-container">
    <a href="FirstPage.html" class="btn"><span class="icon">🏠</span></a>
  </div>

</body>
</html>
