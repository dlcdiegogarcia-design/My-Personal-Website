<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Favorite Things</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #e0f7fa, #b2ebf2); }
    header { text-align: center; margin-bottom: 18px; }
    h1 { margin: 0; font-size: 24px; }
    .things { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .thing { text-align: center; max-width: 400px; }
    .thing img { max-width: 100%; height: auto; border-radius: 8px; }
    .thing h4 { margin: 10px 0; }
    .button-container { text-align: center; margin-top: 20px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; background: #0366d6; color: #fff; text-decoration: none; border-radius: 6px; }
    .btn:hover { background: #0356b6; }
    .icon { font-size: 18px; }
  </style>
</head>
<body>
  <header>
    <h1>Favorite Things</h1>
  </header>

  <main class="things">
    <div class="thing">
      <h4>Video Games</h4>
      <img src="/FirstPage/Images/2k26logo.png" alt="2K26" width="110">
      <img src="/FirstPage/Images/fc26.jpg" alt="FC26" width="200">
    </div>

    <div class="thing">
      <h4>Movies and Series</h4>
      <img src="/FirstPage/Images/Movies.jpg" alt="Movies and Series" width="350">
    </div>

    <div class="thing">
      <h4>Soccer</h4>
      <img src="/FirstPage/Images/soccer.jpg" alt="Soccer" width="350">
    </div>
  </main>

  <div class="button-container">
    <a href="FirstPage.html" class="btn"><span class="icon">🏠</span></a>
  </div>

</body>
</html>
